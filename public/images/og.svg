    </linearGradient>
    <radialGradient id="blobA" cx="86%" cy="16%" r="52%">
      <stop offset="0%" stop-color="#E0B478" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#E0B478" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="6%" cy="94%" r="52%">
