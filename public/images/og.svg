  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blobA)"/>
  <rect width="1200" height="630" fill="url(#blobB)"/>

  <g transform="translate(1028,315)">
    <circle cx="0" cy="0" r="182" fill="url(#ring)"/>
    <circle cx="0" cy="0" r="136" fill="url(#portrait)" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="0" cy="-30" r="78" fill="#FAF2E0" opacity="0.55"/>
    <text x="0" y="48" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="118" font-weight="500" fill="#4F6A57" fill-opacity="0.32">AD</text>
